model:
  name: bert-base-uncased
  type: sequence_classification
  labeling: majority_vote

training:
  epochs: 3
  batch_size: 8
  learning_rate: 2e-5
  weight_decay: 0.01
  evaluation_strategy: epoch
  best_model_metric: macro_f1

validation:
  - epoch: 1
    macro_f1: 0.4700
    weighted_f1: 0.8337
    accuracy: 0.8869
  - epoch: 2
    macro_f1: 0.5215
    weighted_f1: 0.8477
    accuracy: 0.8929
  - epoch: 3
    macro_f1: 0.5622
    weighted_f1: 0.8566
    accuracy: 0.8929

test:
  accuracy: 0.9048
  macro_f1: 0.6410
  weighted_f1: 0.8828
  loss: 0.2989